services:
  neoforge:
    build:
      context: .
      args:
        NEOFORGE_VERSION: ${NEOFORGE_VERSION}
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-25565}:25565"
    volumes:
      - ./servers/${SERVER_NAME}-server/mods:/server/mods
      - ./servers/${SERVER_NAME}-server/config:/server/config
      - ./servers/${SERVER_NAME}-server/world:/server/world
      - ./servers/${SERVER_NAME}-server/logs:/server/logs
    environment:
      - JAVA_TOOL_OPTIONS=-Xms${JAVA_MIN_MEMORY:-4G} -Xmx${JAVA_MAX_MEMORY:-8G}
    stdin_open: true
    tty: true
    restart: unless-stopped
    container_name: ${SERVER_NAME:-minecraft-server}

  filebrowser:
    image: filebrowser/filebrowser:latest
    ports:
      - "8080:80"
    volumes:
      - ./servers:/srv
      - ./filebrowser.db:/database.db
      - ./filebrowser.json:/.filebrowser.json
    restart: unless-stopped