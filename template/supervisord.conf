[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:neoforge]
command=sh /server/run.sh
directory=/server
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:filebrowser]
command=filebrowser -r /server -a 0.0.0.0 -p 8080 --noauth
directory=/server
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0